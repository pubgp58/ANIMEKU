<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeKu Stabil</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

/* NAVBAR */
.navbar {
  height:60px;
  width:100%;
  background:#1a1a1a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  position:sticky;
  top:0;
  z-index:100;
}

.logo { color:#ffcc00; font-weight:bold; }

.search {
  width:180px;
  padding:6px 10px;
  border-radius:20px;
  border:none;
}

/* MENU BUTTON */
.menu-btn {
  font-size:20px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:60px;
  left:-260px;
  width:260px;
  height:calc(100vh - 60px);
  background:#141414;
  padding:20px;
  transition:left 0.3s ease;
  z-index:200;
}

.sidebar.active { left:0; }

/* OVERLAY */
.overlay {
  position:fixed;
  top:60px;
  left:0;
  width:100%;
  height:calc(100vh - 60px);
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:150;
}

.overlay.active { display:block; }

/* MAIN */
.main {
  width:100%;
  padding:20px;
}

/* LOADING */
#loading {
  text-align:center;
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap:20px;
  max-width:1400px;
  margin:auto;
}

/* MOBILE */
@media (max-width:500px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  }
}

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:0.2s;
  cursor:pointer;
}

.card:hover {
  transform:scale(1.03);
}

/* IMAGE */
.card img {
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}

/* TITLE */
.card h3 {
  padding:10px;
  font-size:14px;
  height:42px;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

/* MENU */
.menu div {
  padding:10px;
  cursor:pointer;
}

.menu div:hover {
  background:#222;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div class="logo">AnimeKu</div>
  <input type="text" id="search" class="search" placeholder="Cari anime...">
</div>

<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <div class="menu">
    <div onclick="showAll(); closeMenu()">🏠 Home</div>
    <div onclick="filterOngoing(); closeMenu()">🔥 Ongoing</div>
    <div onclick="filterCompleted(); closeMenu()">✅ Completed</div>
    <div onclick="filterGenre('Action'); closeMenu()">🎭 Genre Action</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="main">
  <h2>Anime</h2>
  <div id="loading">Loading...</div>
  <div class="grid" id="animeList"></div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

let allAnime = [];

/* MENU */
function openMenu() {
  sidebar.classList.add("active");
  overlay.classList.add("active");
}

function closeMenu() {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* LOAD DATA */
async function loadAnime() {
  document.getElementById("loading").style.display = "block";

  try {
    const res = await fetch("https://api.jikan.moe/v4/top/anime?limit=24");
    const data = await res.json();

    allAnime = data.data;

    // simpan cache
    localStorage.setItem("animeCache", JSON.stringify(allAnime));

    renderAnime(allAnime);
  } catch (err) {
    // fallback cache
    const cache = localStorage.getItem("animeCache");
    if (cache) {
      allAnime = JSON.parse(cache);
      renderAnime(allAnime);
    } else {
      document.getElementById("animeList").innerHTML = "Gagal load data";
    }
  }

  document.getElementById("loading").style.display = "none";
}

/* RENDER */
function renderAnime(list) {
  let html = "";
  list.forEach(a => {
    html += `
      <div class="card" onclick="openDetail('${a.url}')">
        <img src="${a.images.jpg.image_url}">
        <h3>${a.title}</h3>
      </div>
    `;
  });
  document.getElementById("animeList").innerHTML = html;
}

/* FILTER */
function showAll() {
  renderAnime(allAnime);
}

function filterOngoing() {
  renderAnime(allAnime.filter(a => a.status === "Currently Airing"));
}

function filterCompleted() {
  renderAnime(allAnime.filter(a => a.status === "Finished Airing"));
}

function filterGenre(g) {
  renderAnime(allAnime.filter(a =>
    a.genres && a.genres.some(x => x.name === g)
  ));
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  renderAnime(allAnime.filter(a =>
    (a.title || "").toLowerCase().includes(keyword)
  ));
});

/* DETAIL */
function openDetail(url) {
  window.open(url, "_blank");
}

/* START */
loadAnime();
</script>

</body>
</html>
