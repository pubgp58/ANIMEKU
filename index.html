<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AnimeKu</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:15px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
  background:#262626;
}
</style>

</head>
<body>

<h1>🔥 AnimeKu</h1>

<div class="grid" id="list"></div>

<script>

// ===== DATABASE LANGSUNG =====
const data = [
"One Piece",
"Liar Game",
"Ao no Orchestra Season 2",
"Isekai Nonbiri Nouka Season 2",
"Marriagetoxin",
"Aishiteru Game wo Owarasetai",
"Class de 2-banme ni Kawaii Onnanoko",
"Replica datte, Koi wo Suru",
"Ponkotsu Fuuki Iin",
"Tongari Boushi no Atelier",
"Kuroneko to Majo no Kyoushitsu",
"Ghost Concert",
"Majutsushi Kunon wa Mieteiru",
"Kizoku Tensei",
"Maou no Musume",
"Hanazakari no Kimitachi e"
];

// ===== TAMPILKAN =====
const el = document.getElementById("list");

el.innerHTML = data.map((title, i) => `
  <div class="card">
    <h3>${i+1}. ${title}</h3>
  </div>
`).join("");

</script>

</body>
</html>
